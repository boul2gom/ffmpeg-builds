name: Github CI - Automatic weekly release

on:
  schedule:
    - cron: '0 0 * * 1,4'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force the release even if no updates are found'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (do not publish release)'
        required: false
        type: boolean
        default: false
      skip_nuget:
        description: 'Skip NuGet publish'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  check_updates:
    name: ✅ Check for newer versions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      has_updates: ${{ steps.check_version.outputs.has_updates }}
      version: ${{ steps.check_version.outputs.version }}
      changelog: ${{ steps.check_version.outputs.changelog }}

    steps:
      - name: 📁 Check out the repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 20

      - name: 🔍 Check for ffmpeg version updates
        id: check_version
        uses: actions/github-script@v8.0.0
        with:
          script: |
            try {
              const vcpkg_response = await github.rest.repos.getContent({
                owner: 'microsoft',
                repo: 'vcpkg',
                path: 'ports/ffmpeg/vcpkg.json',
                ref: 'master'
              });
              
              const vcpkg_content = Buffer.from(vcpkg_response.data.content, 'base64').toString();
              const vcpkg_json = JSON.parse(vcpkg_content);
              const vcpkg_version = vcpkg_json.version;
              console.log(`📦 Latest vcpkg ffmpeg version: ${vcpkg_version}`);
              
              let latest_release_version = "0.0.0";
              let latest_release_date = null;
              try {
                const releases = await github.rest.repos.getLatestRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo
                });
                latest_release_version = releases.data.tag_name.replace(/^v/, '');
                latest_release_date = releases.data.published_at;
                console.log(`🏷️ Latest repo release: ${releases.data.tag_name} (${latest_release_date})`);
              } catch (e) {
                console.log("⚠️ No releases found, assuming 0.0.0");
              }
              
              const has_updates = (vcpkg_version !== latest_release_version) || ("${{ inputs.force_release }}" === "true");
              
              if ("${{ inputs.force_release }}" === "true") {
                 console.log("ℹ️ Force release enabled.");
              }
              
              console.log(`🚀 Has updates? ${has_updates}`);
              
              let changelog = "";
              if (latest_release_version === "0.0.0" || !latest_release_date) {
                console.log("⚠️ First release or no previous release found. Skipping detailed changelog.");
                changelog = "Initial release or manual build.";
              } else {
                try {
                  console.log(`🔍 Fetching commits since ${latest_release_date}...`);
                  const commits = await github.rest.repos.listCommits({
                    owner: 'microsoft',
                    repo: 'vcpkg',
                    path: 'ports/ffmpeg',
                    since: latest_release_date
                  });
                  
                  changelog = "### 📜 Vcpkg Changes\n";
                  const commit_list = commits.data.slice(0, 20);
                  console.log(`✅ Found ${commits.data.length} commits. Constructing changelog for top ${commit_list.length}:`);
                  
                  if (commit_list.length === 0) {
                     changelog += "No changes found in vcpkg ports/ffmpeg since last release.\n";
                  } else {
                      for (const commit of commit_list) {
                        const message = commit.commit.message.split('\n')[0];
                        const author = commit.commit.author.name;
                        const date = new Date(commit.commit.author.date).toISOString().split('T')[0];
                        console.log(`  - [${date}] ${message} (${author})`);
                        changelog += `- ${date}: ${message} (${author})\n`;
                      }
                  }
                  console.log("✅ Fetched changelog");
                } catch (e) {
                  console.log(`⚠️ Failed to fetch changelog: ${e.message}`);
                  changelog = "Failed to fetch changelog.";
                }
              }

              core.setOutput("version", vcpkg_version);
              core.setOutput("has_updates", has_updates.toString());
              core.setOutput("changelog", changelog);
              
            } catch (error) {
              core.setFailed(`Failed to check versions: ${error.message}`);
            }

  keep_caches_alive:
    needs: check_updates
    if: ${{ needs.check_updates.outputs.has_updates != 'true' }}
    name: 🛡️ Keep caches alive
    
    strategy:
      fail-fast: false
      matrix:
        target-os: [windows, linux, osx]
        target-arch: [arm64, x86, x64]
        include:
          - target-os: windows
            os: windows-latest
          - target-os: linux
            os: ubuntu-latest
          - target-os: osx
            os: macos-latest
        exclude:
          # macOS x86 is deprecated
          - target-os: osx
            target-arch: x86

    runs-on: ${{ matrix.os }}

    env:
      VCPKG_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache

    steps:
      - name: 📁 Checkout self
        uses: actions/checkout@v6.0.2
        with:
          path: self/

      - name: 📁 Checkout vcpkg
        uses: actions/checkout@v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: master
          path: vcpkg/
          fetch-depth: 1

      - name: 🗃️ Restore vcpkg executable cache
        uses: actions/cache/restore@v4
        with:
          path: |
            vcpkg/vcpkg
            vcpkg/vcpkg.exe
          key: ${{ matrix.target-os }}-vcpkg-exe-${{ hashFiles('vcpkg/.git/HEAD') }}

      - name: 🗃️ Restore vcpkg downloads cache
        uses: actions/cache/restore@v4
        with:
          path: vcpkg/downloads
          key: ${{ matrix.target-os }}-${{ matrix.target-arch }}-vcpkg-downloads-${{ hashFiles('self/vcpkg.json') }}
          restore-keys: |
            ${{ matrix.target-os }}-${{ matrix.target-arch }}-vcpkg-downloads-

      - name: 🗃️ Restore vcpkg binary cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: ${{ matrix.target-os }}-${{ matrix.target-arch }}-vcpkg-binary-${{ hashFiles('self/vcpkg.json') }}
          restore-keys: |
            ${{ matrix.target-os }}-${{ matrix.target-arch }}-vcpkg-binary-

      - name: 🗃️ Restore homebrew cache
        if: matrix.target-os == 'osx'
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ matrix.target-os }}-brew-${{ hashFiles('self/install-deps.sh') }}
          restore-keys: |
            ${{ matrix.target-os }}-brew-

      - name: 🗃️ Restore apt cache
        if: matrix.target-os == 'linux'
        uses: actions/cache/restore@v4
        with:
          path: apt-cache
          key: ${{ matrix.target-os }}-apt-${{ hashFiles('self/install-deps.sh') }}
          restore-keys: |
            ${{ matrix.target-os }}-apt-

  pack_binaries:
    needs: check_updates
    if: ${{ needs.check_updates.outputs.has_updates == 'true' }}
    name: 📦 Build ${{ matrix.target-os }}-${{ matrix.target-arch }}
    
    strategy:
      fail-fast: false
      matrix:
        target-os: [windows, linux, osx]
        target-arch: [arm64, x86, x64]
        include:
          - target-os: windows
            os: windows-latest
          - target-os: linux
            os: ubuntu-latest
          - target-os: osx
            os: macos-latest
        exclude:
          # macOS x86 is deprecated
          - target-os: osx
            target-arch: x86

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write
      packages: write

    env:
      VCPKG_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache
      VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/vcpkg_cache,readwrite'

    steps:
      - name: ⚙️ Export GitHub Actions Cache environment variables
        uses: actions/github-script@v8.0.0
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: 📁 Checkout self
        uses: actions/checkout@v6.0.2
        with:
          path: self/

      - name: 📁 Checkout vcpkg
        uses: actions/checkout@v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: master
          path: vcpkg/
          fetch-depth: 1

      - name: 🗃️ Cache vcpkg executable
        uses: actions/cache@v5.0.3
        with:
          path: |
            vcpkg/vcpkg
            vcpkg/vcpkg.exe
          key: ${{ matrix.target-os }}-vcpkg-exe-${{ hashFiles('vcpkg/.git/HEAD') }}

      - name: 🗃️ Cache vcpkg downloads
        uses: actions/cache@v5.0.3
        with:
          path: vcpkg/downloads
          key: ${{ matrix.target-os }}-${{ matrix.target-arch }}-vcpkg-downloads-${{ hashFiles('self/vcpkg.json') }}
          restore-keys: |
            ${{ matrix.target-os }}-${{ matrix.target-arch }}-vcpkg-downloads-

      - name: 🗃️ Cache vcpkg binary
        uses: actions/cache@v5.0.3
        with:
          path: ${{ env.VCPKG_BINARY_CACHE }}
          key: ${{ matrix.target-os }}-${{ matrix.target-arch }}-vcpkg-binary-${{ hashFiles('self/vcpkg.json') }}
          restore-keys: |
            ${{ matrix.target-os }}-${{ matrix.target-arch }}-vcpkg-binary-

      - name: 📁 Create cache directory
        shell: bash
        run: mkdir -p ${{ env.VCPKG_BINARY_CACHE }}

      - name: 🛠️ Bootstrap vcpkg
        shell: bash
        run: |
          if [ "${{ matrix.target-os }}" == "windows" ]; then
            ./vcpkg/bootstrap-vcpkg.bat
          else
            ./vcpkg/bootstrap-vcpkg.sh
          fi

      - name: 🗃️ Cache homebrew downloads
        if: matrix.target-os == 'osx'
        uses: actions/cache@v5.0.3
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ matrix.target-os }}-brew-${{ hashFiles('self/install-deps.sh') }}
          restore-keys: |
            ${{ matrix.target-os }}-brew-

      - name: 📥 Restore homebrew downloads
        if: matrix.target-os == 'osx'
        shell: bash
        run: |
          mkdir -p ~/Library/Caches/Homebrew

      - name: 🗃️ Cache apt archives
        if: matrix.target-os == 'linux'
        uses: actions/cache@v5.0.3
        with:
          path: apt-cache
          key: ${{ matrix.target-os }}-apt-${{ hashFiles('self/install-deps.sh') }}
          restore-keys: |
            ${{ matrix.target-os }}-apt-

      - name: 📥 Restore apt archives
        if: matrix.target-os == 'linux'
        shell: bash
        run: |
          mkdir -p apt-cache
          sudo mkdir -p /var/cache/apt/archives
          sudo cp -r apt-cache/* /var/cache/apt/archives/ || true

      - name: 📌 Install dependencies
        shell: bash
        run: |
          if [ "${{ matrix.target-os }}" == "windows" ]; then
            ./self/install-deps.ps1
          else
            ./self/install-deps.sh
          fi

      - name: 📤 Save apt archives
        if: matrix.target-os == 'linux'
        shell: bash
        run: |
          mkdir -p apt-cache
          sudo cp -r /var/cache/apt/archives/*.deb apt-cache/ || true

      - name: 🏗️ Build ffmpeg
        shell: bash
        run: |
          ./vcpkg/vcpkg install \
            --recurse \
            --overlay-triplets=./self/triplets \
            --triplet ${{ matrix.target-arch }}-${{ matrix.target-os }} \
            --x-manifest-root self/

      - name: 📦 Export to NuGet
        if: matrix.target-os == 'windows' && inputs.skip_nuget != true
        run: |
          ./vcpkg/vcpkg export ffmpeg --nuget --nuget-id=boul2gom.FFmpeg --nuget-version=${{ needs.check_updates.outputs.version }} --output=ffmpeg-nuget --x-install-root=self/vcpkg_installed --overlay-triplets=./self/triplets --triplet ${{ matrix.target-arch }}-${{ matrix.target-os }}

      - name: 🚀 Publish to GitHub Packages
        if: matrix.target-os == 'windows' && inputs.skip_nuget != true
        run: |
          $sourceUrl = "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          $sourceName = "GitHubRepo"

          # Remove source if it already exists, ignoring errors the PowerShell way
          dotnet nuget remove source $sourceName 2>$null

          dotnet nuget add source $sourceUrl `
            --name $sourceName `
            --username "${{ github.actor }}" `
            --password "${{ secrets.GITHUB_TOKEN }}" `
            --store-password-in-clear-text

          # Search in vcpkg/ where the export actually puts the .nupkg
          $nupkgFile = Get-ChildItem -Path vcpkg/ -Filter "*.nupkg" | Select-Object -First 1

          if ($nupkgFile) {
              Write-Host "Found package: $($nupkgFile.FullName)"
              dotnet nuget push "$($nupkgFile.FullName)" --source $sourceName --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
          } else {
              Write-Error "No .nupkg file found to publish!"
              exit 1
          }

      - name: 📤 Upload build logs
        uses: actions/upload-artifact@v6.0.0
        if: failure()
        continue-on-error: true
        with:
          name: logs-${{ matrix.target-os }}-${{ matrix.target-arch }}
          path: |
            vcpkg/buildtrees/**/*.log
            !vcpkg/buildtrees/**/src/**
          if-no-files-found: ignore

      - name: 📤 Upload build output
        uses: actions/upload-artifact@v6.0.0
        with:
          name: ffmpeg-${{ matrix.target-os }}-${{ matrix.target-arch }}
          path: self/vcpkg_installed/${{ matrix.target-arch }}-${{ matrix.target-os }}/tools/ffmpeg/
          if-no-files-found: error

  release_binaries:
    name: 🚀 Create Release & Upload
    needs: [check_updates, pack_binaries]
    if: needs.check_updates.outputs.has_updates == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    
    steps:
      - name: 🔐 Generate ephemeral token from GitHub App
        id: app-token
        uses: actions/create-github-app-token@v2.2.1
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}

      - name: 📁 Check out the repository
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: 🔐 Import GPG Key and setup Git
        uses: crazy-max/ghaction-import-gpg@v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          trust_level: 5
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_config_global: true
          git_committer_name: "boul2gom-bot"
          git_committer_email: "actions-bot@boul2gom.com"

      - name: 🏷️ Create and push signed tag
        run: |
          git tag -s "v${{ needs.check_updates.outputs.version }}" -m "🔖 v${{ needs.check_updates.outputs.version }}"
          git push origin "v${{ needs.check_updates.outputs.version }}"

      - name: 📅 Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d %H::%M')" >> $GITHUB_ENV

      - name: 📥 Download all build artifacts
        uses: actions/download-artifact@v7.0.0
        with:
          path: artifacts

      - name: 📦 Archive artifacts
        run: |
          mkdir release_assets
          for dir in artifacts/ffmpeg-*; do
            if [ -d "$dir" ]; then
              dirname=$(basename "$dir")
              echo "Packaging $dirname..."
              
              if [[ "$dirname" != *"windows"* ]]; then
                 chmod +x "$dir/ffmpeg" || true
              fi
              
              pushd "$dir"
              zip -r "../../release_assets/$dirname.zip" .
              popd
            fi
          done
          ls -l release_assets/
          
          echo "🧮 Calculating Checksums..."
          pushd release_assets
          sha256sum *.zip > ../checksums.sha256
          popd
          
          echo "CHECKSUMS<<EOF" >> $GITHUB_ENV
          cat checksums.sha256 >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🔐 Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release_assets/*

      - name: 🚀 Create Release & Upload Assets
        uses: softprops/action-gh-release@v2.5.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: v${{ needs.check_updates.outputs.version }}
          name: 🔖 v${{ needs.check_updates.outputs.version }}
          draft: false
          prerelease: false
          files: release_assets/*
          fail_on_unmatched_files: true
          body: |
            ## 🚀 FFmpeg v${{ needs.check_updates.outputs.version }}
            
            Automated build triggered by update in `vcpkg`. Built on ${{ env.date }}

            ${{ needs.check_updates.outputs.changelog }}
            
            ### 📦 Artifacts & Checksums
            ```text
            ${{ env.CHECKSUMS }}
            ```